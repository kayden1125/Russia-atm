<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RosComBank - Operator Console</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #0f172a; color: #cbd5e1; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        header { border-bottom: 2px solid #3b82f6; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; color: #fff; font-size: 24px; text-transform: uppercase; letter-spacing: 1px; }
        h1 span { color: #3b82f6; }
        .status { background: #10b981; color: white; padding: 5px 10px; border-radius: 4px; font-weight: bold; font-size: 14px; }
        .status.disconnected { background: #ef4444; }
        .log-container { flex: 1; background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 15px; overflow-y: auto; font-family: 'Courier New', Courier, monospace; }
        .log-entry { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #334155; }
        .log-entry:last-child { border-bottom: none; }
        .time { color: #64748b; font-size: 14px; margin-right: 10px; }
        .card { color: #93c5fd; font-weight: bold; margin-right: 10px; }
        .action { color: #fff; }
        .alert { color: #f87171; font-weight: bold; }
        .success { color: #34d399; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1><span>RosCom</span>Bank Console</h1>
        <div id="conn-status" class="status disconnected">DISCONNECTED</div>
    </header>

    <div class="log-container" id="logs"></div>

    <script>
        const socket = io();
        const logsDiv = document.getElementById('logs');
        const statusBadge = document.getElementById('conn-status');

        socket.on('connect', () => {
            statusBadge.textContent = 'CONNECTED';
            statusBadge.classList.remove('disconnected');
        });

        socket.on('disconnect', () => {
            statusBadge.textContent = 'DISCONNECTED';
            statusBadge.classList.add('disconnected');
        });

        socket.on('operator_update', (data) => {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            let colorClass = 'action';
            if (data.type === 'ERROR') colorClass = 'alert';
            if (data.type === 'SUCCESS') colorClass = 'success';
            entry.innerHTML = `<span class="time">[${data.timestamp}]</span> <span class="card">[Card: ${data.card || 'NO_CARD'}]</span> <span class="${colorClass}">${data.message}</span>`;
            logsDiv.prepend(entry);
        });
    </script>
</body>
</html>
