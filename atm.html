<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RosComBank ATM - Kiosk Mode</title>
<script src="/socket.io/socket.io.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; cursor: none; }
body { background: #000; font-family: 'Segoe UI', Arial, sans-serif; width: 100vw; height: 100vh; overflow: hidden; touch-action: none; display: flex; flex-direction: column; }
.atm-machine { background: #2a2c30; padding: 2vh 3vw; width: 100%; height: 100%; display: flex; flex-direction: column; gap: 2vh; }
.bank-branding { text-align: center; color: #cbd5e1; font-size: clamp(24px, 4vh, 36px); font-weight: 800; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 2px 4px rgba(0,0,0,0.5); padding: 10px; cursor: pointer; }
.bank-branding span { color: #3b82f6; }
.screen-bezel { background: #111; padding: 2vh 2vw; border-radius: 12px; display: flex; align-items: center; gap: 15px; box-shadow: inset 0 0 20px rgba(0,0,0,0.9), 0 5px 10px rgba(255,255,255,0.05); flex: 1; }
.screen { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); flex: 1; height: 100%; border: 4px solid #000; border-radius: 6px; position: relative; overflow: hidden; color: #fff; display: flex; flex-direction: column; box-shadow: inset 0 0 40px rgba(0,0,0,0.8); }
.screen::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 4px 4px; pointer-events: none; z-index: 10; }
.fdk-col { display: flex; flex-direction: column; justify-content: space-around; height: 100%; padding: 20px 0; }
.fdk-btn { width: clamp(35px, 5vw, 60px); height: clamp(30px, 6vh, 50px); background: linear-gradient(to right, #4b5563, #374151); border: 2px solid #1f2937; border-radius: 6px; box-shadow: 2px 2px 5px rgba(0,0,0,0.6), inset 1px 1px 2px rgba(255,255,255,0.1); transition: all 0.1s; position: relative; }
.fdk-btn::after { content: '▶'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 12px; color: rgba(255,255,255,0.2); }
.fdk-btn.left-btn::after { content: '◀'; }
.fdk-btn:active { background: #1f2937; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.8); }
.keypad-container { background: #cbd5e1; padding: 2vh 3vw; border-radius: 12px; border: 2px solid #94a3b8; box-shadow: inset 0 0 20px rgba(0,0,0,0.2), 0 10px 20px rgba(0,0,0,0.5); width: 100%; max-width: 500px; margin: 0 auto; position: relative; flex-shrink: 0; }
.keypad-container::before { content: ''; position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 60px; height: 4px; background: rgba(0,0,0,0.1); border-radius: 2px; }
.keypad-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: clamp(8px, 1.5vh, 12px); }
.key-btn { background: linear-gradient(to bottom, #f8fafc, #e2e8f0); border: 1px solid #94a3b8; border-radius: 6px; padding: clamp(12px, 2vh, 20px) 0; font-size: clamp(18px, 3vh, 24px); font-weight: 700; color: #1e293b; box-shadow: 0 4px 0 #94a3b8, 0 5px 8px rgba(0,0,0,0.3); text-align: center; transition: all 0.1s; font-family: 'Segoe UI', Arial, sans-serif; }
.key-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #94a3b8, 0 1px 2px rgba(0,0,0,0.3); }
.key-btn.cancel { background: linear-gradient(to bottom, #ef4444, #dc2626); color: white; border-color: #991b1b; box-shadow: 0 4px 0 #7f1d1d, 0 5px 8px rgba(0,0,0,0.3); font-size: clamp(12px, 1.5vh, 16px); }
.key-btn.cancel:active { box-shadow: 0 0 0 #7f1d1d, 0 1px 2px rgba(0,0,0,0.3); }
.key-btn.clear { background: linear-gradient(to bottom, #f59e0b, #d97706); color: white; border-color: #92400e; box-shadow: 0 4px 0 #78350f, 0 5px 8px rgba(0,0,0,0.3); font-size: clamp(12px, 1.5vh, 16px); }
.key-btn.clear:active { box-shadow: 0 0 0 #78350f, 0 1px 2px rgba(0,0,0,0.3); }
.key-btn.enter { background: linear-gradient(to bottom, #22c55e, #16a34a); color: white; border-color: #166534; box-shadow: 0 4px 0 #14532d, 0 5px 8px rgba(0,0,0,0.3); font-size: clamp(12px, 1.5vh, 16px); grid-row: span 2; display: flex; align-items: center; justify-content: center; }
.key-btn.enter:active { transform: translateY(4px); box-shadow: 0 0 0 #14532d, 0 1px 2px rgba(0,0,0,0.3); }
.key-empty { visibility: hidden; }
.screen-content { padding: 2vw; flex: 1; display: flex; flex-direction: column; position: relative; z-index: 5; }
.status-bar { background: rgba(0,0,0,0.4); padding: 6px 16px; font-size: 11px; color: #93c5fd; text-transform: uppercase; letter-spacing: 1px; text-align: right; border-top: 1px solid rgba(255,255,255,0.05); z-index: 5; }
.fdk-labels { display: flex; justify-content: space-between; flex: 1; margin-top: 10px; }
.left-labels, .right-labels { display: flex; flex-direction: column; justify-content: space-between; width: 45%; padding: 1vh 0; }
.right-labels { align-items: flex-end; text-align: right; }
.f-label { background: rgba(30, 64, 175, 0.8); padding: 1vh 1vw; border-left: 5px solid #60a5fa; font-size: clamp(14px, 2.5vh, 18px); font-weight: 700; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); min-height: clamp(40px, 8vh, 70px); display: flex; flex-direction: column; justify-content: center; backdrop-filter: blur(2px); visibility: hidden; }
.f-label.visible { visibility: visible; }
.right-labels .f-label { border-left: none; border-right: 5px solid #60a5fa; align-items: flex-end; }
.f-label.danger { background: rgba(153, 27, 27, 0.8); border-color: #f87171; }
.f-sub { font-size: clamp(11px, 2vh, 14px); color: #bfdbfe; font-weight: 400; margin-top: 2px; }
.danger .f-sub { color: #fecaca; }
.center-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 85%; background: rgba(15, 23, 42, 0.7); padding: 3vh 2vw; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 25px rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
.msg-title { font-size: clamp(20px, 3.5vh, 28px); font-weight: bold; color: #fff; margin-bottom: 1vh; }
.msg-sub { font-size: clamp(14px, 2vh, 18px); color: #93c5fd; }
.msg-alert { color: #ef4444; }
.pin-display { display: flex; justify-content: center; gap: 16px; margin-top: 3vh; }
.pin-char { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #60a5fa; background: transparent; }
.pin-char.filled { background: #60a5fa; box-shadow: 0 0 8px #60a5fa; }
.amount-disp { font-size: clamp(32px, 6vh, 52px); font-weight: bold; color: #60a5fa; margin: 2vh 0; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
.history-list { font-size: clamp(12px, 2vh, 16px); text-align: left; max-height: 25vh; overflow-y: auto; color: #e2e8f0; line-height: 1.8; margin-top: 2vh; }
.history-item { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 5px 0; }
.loading-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-top: 2vh; overflow: hidden; }
.loading-fill { height: 100%; width: 0%; background: #3b82f6; animation: load 1.5s forwards; }
@keyframes load { to { width: 100%; } }
</style>
</head>
<body oncontextmenu="return false;"> <div class="atm-machine" id="machine-wrapper">
<div class="bank-branding" ondblclick="toggleFullScreen()"><span>RosCom</span>Bank</div>

<div class="screen-bezel">
<div class="fdk-col">
<button class="fdk-btn" onclick="pressFDK('L1')"></button>
<button class="fdk-btn" onclick="pressFDK('L2')"></button>
<button class="fdk-btn" onclick="pressFDK('L3')"></button>
<button class="fdk-btn" onclick="pressFDK('L4')"></button>
</div>

<div class="screen">
<div class="screen-content" id="app"></div>
<div class="status-bar" id="statusbar">SECURE SESSION · KIOSK MODE</div>
</div>

<div class="fdk-col">
<button class="fdk-btn left-btn" onclick="pressFDK('R1')"></button>
<button class="fdk-btn left-btn" onclick="pressFDK('R2')"></button>
<button class="fdk-btn left-btn" onclick="pressFDK('R3')"></button>
<button class="fdk-btn left-btn" onclick="pressFDK('R4')"></button>
</div>
</div>

<div class="keypad-container">
<div class="keypad-grid">
<button class="key-btn" onclick="keyPress('1')">1</button>
<button class="key-btn" onclick="keyPress('2')">2</button>
<button class="key-btn" onclick="keyPress('3')">3</button>
<button class="key-btn cancel" onclick="keyCancel()">CANCEL</button>
<button class="key-btn" onclick="keyPress('4')">4</button>
<button class="key-btn" onclick="keyPress('5')">5</button>
<button class="key-btn" onclick="keyPress('6')">6</button>
<button class="key-btn clear" onclick="keyClear()">CLEAR</button>
<button class="key-btn" onclick="keyPress('7')">7</button>
<button class="key-btn" onclick="keyPress('8')">8</button>
<button class="key-btn" onclick="keyPress('9')">9</button>
<button class="key-btn enter" onclick="keyEnter()">ENTER</button>
<div class="key-empty"></div>
<button class="key-btn" onclick="keyPress('0')">0</button>
<div class="key-empty"></div>
</div>
</div>
</div>

<script>
const socket = io();

function sendOpEvent(msg, type = 'INFO') {
    socket.emit('atm_event', {
        timestamp: new Date().toLocaleTimeString(),
        card: card,
        message: msg,
        type: type
    });
}

function toggleFullScreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => { console.log(err.message); });
    } else {
        if (document.exitFullscreen) document.exitFullscreen();
    }
}

let balance = Math.floor(Math.random()*900000)+50000;
let card = "**** " + Math.floor(Math.random()*9000+1000);
let attempts = 0;
let locked = false;
let historyLog = [];
let screenMode = "welcome";
let inputData = "";
let fdkMap = {};

let _ctx = null;
function ctx(){ if(!_ctx) _ctx = new (window.AudioContext||window.webkitAudioContext)(); if(_ctx.state==='suspended') _ctx.resume(); return _ctx; }
function tone(freq, dur, type='square', vol=0.08){ try { const c=ctx(), o=c.createOscillator(), g=c.createGain(); o.type=type; o.frequency.value=freq; g.gain.setValueAtTime(vol, c.currentTime); g.gain.exponentialRampToValueAtTime(0.001, c.currentTime+dur); o.connect(g); g.connect(c.destination); o.start(); o.stop(c.currentTime+dur); } catch(e) {} }
function beepKey() { tone(880, 0.07, 'square', 0.07); }
function beepOk() { tone(1046, 0.08, 'sine', 0.09); setTimeout(()=>tone(1318,0.12,'sine',0.09), 90); }
function beepError() { tone(220, 0.18, 'sawtooth', 0.10); setTimeout(()=>tone(180,0.22,'sawtooth',0.09),100); }
function beepNav() { tone(660, 0.06, 'sine', 0.06); }
function beepCash() { [0,80,160,240].forEach(d=>setTimeout(()=>tone(523+d*2,0.07,'square',0.07),d)); setTimeout(()=>tone(1046,0.18,'sine',0.10),350); }

function logTx(t){ 
    historyLog.unshift(new Date().toLocaleTimeString()+" – "+t); 
    sendOpEvent(`Logged Transaction: ${t}`, 'INFO');
}
function setStatus(t){ document.getElementById("statusbar").textContent = t; }

function getFDKHTML(id, ru, en, isDanger=false) { return `<div class="f-label ${id} ${ru?'visible':''} ${isDanger?'danger':''}" id="lbl-${id}"><div>${ru}</div><div class="f-sub">${en}</div></div>`; }
function clearFDKs() { fdkMap = {}; }
function pressFDK(id) { if(fdkMap[id]) { beepNav(); fdkMap[id](); } }

function keyPress(n) { beepKey(); if(screenMode === "pin" && inputData.length < 4) { inputData += n; render(); } if(screenMode === "transfer_in" && inputData.length < 8) { inputData += n; render(); } }
function keyClear() { beepNav(); if(screenMode === "pin" || screenMode === "transfer_in") { inputData = ""; render(); } }
function keyCancel() { beepNav(); if(screenMode === "welcome" || screenMode === "loading" || screenMode === "msg") return; if(screenMode === "pin") logout(); else { screenMode = "menu"; render(); } }
function keyEnter() { beepNav(); if(screenMode === "welcome") startLoad(); else if(screenMode === "pin") login(); else if(screenMode === "transfer_in") execTransfer(); else if(screenMode === "msg") { screenMode = "menu"; render(); } }

function render(){
const app = document.getElementById("app");
clearFDKs();
let html = `<div class="fdk-labels"><div class="left-labels">${getFDKHTML('L1', '', '')}${getFDKHTML('L2', '', '')}${getFDKHTML('L3', '', '')}${getFDKHTML('L4', '', '')}</div><div class="right-labels">${getFDKHTML('R1', '', '')}${getFDKHTML('R2', '', '')}${getFDKHTML('R3', '', '')}${getFDKHTML('R4', '', '')}</div></div>`;

if(screenMode === "welcome"){
html += `<div class="center-msg"><div class="msg-title">Вставьте карту</div><div class="msg-sub">Please insert your card</div></div>`;
html = html.replace('id="lbl-R4"', 'id="lbl-R4"').replace('</div><div class="f-sub"></div>', 'Вставить карту</div><div class="f-sub">Insert Card ▶</div>');
app.innerHTML = html; document.getElementById('lbl-R4').classList.add('visible'); fdkMap['R4'] = startLoad; setStatus("ROSCOMBANK · KIOSK TERMINAL READY");
}

if(screenMode === "loading"){
html += `<div class="center-msg"><div class="msg-title">Чтение чипа...</div><div class="msg-sub">Reading smart card data</div><div class="loading-bar"><div class="loading-fill"></div></div></div>`;
app.innerHTML = html; setStatus("READING CARD...");
sendOpEvent("Card Inserted. Reading Chip...", "INFO");
setTimeout(()=>{ screenMode="pin"; inputData=""; render(); }, 1500);
}

if(screenMode === "pin"){
let dots = Array(4).fill(0).map((_,i)=>`<div class="pin-char${i<inputData.length?' filled':''}"></div>`).join('');
html += `<div class="center-msg"><div class="msg-title">Введите PIN-код</div><div class="msg-sub">Use physical keypad to enter PIN</div><div class="msg-sub" style="font-size:12px;margin-top:5px;opacity:0.6">Demo PIN: 1234</div><div class="pin-display">${dots}</div></div>`;
app.innerHTML = html; setStatus(`CARD: ${card} · AWAITING PIN`);
}

if(screenMode === "menu"){
app.innerHTML = `<div class="fdk-labels"><div class="left-labels">${getFDKHTML('L1', 'Проверить баланс', 'Check Balance')}${getFDKHTML('L2', 'Снять наличные', 'Withdraw Cash')}${getFDKHTML('L3', 'Мини-выписка', 'Mini Statement')}${getFDKHTML('L4', '', '')}</div><div class="right-labels">${getFDKHTML('R1', 'Перевод средств', 'Transfer Funds')}${getFDKHTML('R2', 'Внести наличные', 'Deposit Cash')}${getFDKHTML('R3', '', '')}${getFDKHTML('R4', 'Забрать карту', 'Return Card', true)}</div></div>`;
fdkMap['L1'] = () => { screenMode="balance"; sendOpEvent("User checking balance"); render(); };
fdkMap['L2'] = () => { screenMode="withdraw"; sendOpEvent("User entered withdrawal menu"); render(); };
fdkMap['L3'] = () => { screenMode="ministat"; sendOpEvent("User checking statement"); render(); };
fdkMap['R1'] = () => { screenMode="transfer_in"; inputData=""; sendOpEvent("User entered transfer menu"); render(); };
fdkMap['R2'] = deposit; fdkMap['R4'] = logout; setStatus("MAIN MENU · SELECT TRANSACTION");
}

if(screenMode === "balance"){
html += `<div class="center-msg"><div class="msg-title">Баланс счёта</div><div class="msg-sub">Available Balance</div><div class="amount-disp">${balance.toLocaleString('ru-RU')} ₽</div></div>`;
html = html.replace('id="lbl-R4"', 'id="lbl-R4"').replace('</div><div class="f-sub"></div>', 'Назад</div><div class="f-sub">Go Back</div>');
app.innerHTML = html; document.getElementById('lbl-R4').classList.add('visible'); fdkMap['R4'] = () => { screenMode="menu"; render(); }; setStatus("TRANSACTION APPROVED");
}

if(screenMode === "withdraw"){
app.innerHTML = `<div class="fdk-labels"><div class="left-labels">${getFDKHTML('L1', '1 000 ₽', '')}${getFDKHTML('L2', '2 000 ₽', '')}${getFDKHTML('L3', '5 000 ₽', '')}${getFDKHTML('L4', '10 000 ₽', '')}</div><div class="right-labels">${getFDKHTML('R1', '20 000 ₽', '')}${getFDKHTML('R2', '50 000 ₽', '')}${getFDKHTML('R3', '', '')}${getFDKHTML('R4', 'Отмена', 'Cancel', true)}</div></div>`;
const w = (amt) => { withdraw(amt); };
fdkMap['L1'] = () => w(1000); fdkMap['L2'] = () => w(2000); fdkMap['L3'] = () => w(5000); fdkMap['L4'] = () => w(10000); fdkMap['R1'] = () => w(20000); fdkMap['R2'] = () => w(50000); fdkMap['R4'] = () => { screenMode="menu"; render(); };
setStatus("SELECT WITHDRAWAL AMOUNT");
}

if(screenMode === "ministat"){
const entries = historyLog.length ? historyLog.slice(0,6).map(e=>`<div class="history-item">${e}</div>`).join('') : '<div style="opacity:0.5;font-style:italic">Нет транзакций / No transactions</div>';
html += `<div class="center-msg" style="top:45%"><div class="msg-title">Мини-выписка</div><div class="msg-sub">Recent Transactions</div><div class="history-list">${entries}</div></div>`;
html = html.replace('id="lbl-R4"', 'id="lbl-R4"').replace('</div><div class="f-sub"></div>', 'Назад</div><div class="f-sub">Go Back</div>');
app.innerHTML = html; document.getElementById('lbl-R4').classList.add('visible'); fdkMap['R4'] = () => { screenMode="menu"; render(); }; setStatus("PRINTING STATEMENT TO SCREEN...");
}

if(screenMode === "transfer_in"){
html += `<div class="center-msg"><div class="msg-title">Сумма перевода</div><div class="msg-sub">Use physical keypad to enter amount</div><div class="amount-disp">${inputData ? parseInt(inputData).toLocaleString('ru-RU') : '0'} ₽</div><div class="msg-sub" style="font-size:12px;opacity:0.7">Press ENTER to confirm</div></div>`;
app.innerHTML = html; setStatus("ENTER AMOUNT FOR TRANSFER");
}

if(screenMode === "msg"){
html += `<div class="center-msg"><div class="msg-title ${window.msgIsError ? 'msg-alert' : ''}">${window.msgRu}</div><div class="msg-sub">${window.msgEn}</div></div>`;
app.innerHTML = html; setStatus("PROCESSING...");
}
}

function startLoad(){ beepNav(); screenMode="loading"; render(); }

function login(){
if(locked){ beepError(); showMsg("Карта заблокирована", "CARD BLOCKED", true); sendOpEvent("Login failed: Card Locked", "ERROR"); return; }
if(inputData==="1234"){
beepOk(); screenMode="menu"; sendOpEvent("Successful Login", "SUCCESS"); logTx("Вход выполнен"); render();
} else {
beepError(); attempts++; inputData="";
if(attempts>=3){ locked=true; showMsg("Карта заблокирована", "CARD BLOCKED", true); sendOpEvent("Card Blocked due to max attempts", "ERROR"); }
else { showMsg(`Неверный PIN (${attempts}/3)`, "INCORRECT PIN", true); sendOpEvent(`Failed login attempt (${attempts}/3)`, "ERROR"); }
}
}

function showMsg(ru, en, isErr=false){
window.msgRu = ru; window.msgEn = en; window.msgIsError = isErr; screenMode = "msg"; render();
setTimeout(()=>{ if(screenMode === "msg") { screenMode = (isErr && !locked) ? "pin" : "menu"; render(); } }, 2500);
}

function withdraw(x){
if(balance>=x){ beepCash(); balance-=x; sendOpEvent(`Successful Withdrawal: ${x} ₽`, 'SUCCESS'); logTx("Выдача наличных: "+x.toLocaleString('ru-RU')+" ₽"); showMsg("Заберите деньги", "PLEASE TAKE YOUR CASH");
} else { beepError(); sendOpEvent(`Failed Withdrawal: Insufficient funds (${x} ₽)`, 'ERROR'); showMsg("Недостаточно средств", "INSUFFICIENT FUNDS", true); }
}

function deposit(){
beepOk(); balance+=10000; sendOpEvent("Successful Deposit: 10,000 ₽", "SUCCESS"); logTx("Внесение: 10 000 ₽"); showMsg("Средства зачислены", "DEPOSIT SUCCESSFUL");
}

function execTransfer(){
let amt = parseInt(inputData); inputData = "";
if(isNaN(amt)||amt<=0){ beepError(); sendOpEvent("Failed Transfer: Invalid amount", "ERROR"); showMsg("Неверная сумма", "INVALID AMOUNT", true); return; }
if(balance>=amt){ beepOk(); balance-=amt; sendOpEvent(`Successful Transfer: ${amt} ₽`, "SUCCESS"); logTx("Перевод: "+amt.toLocaleString('ru-RU')+" ₽"); showMsg("Перевод выполнен", "TRANSFER COMPLETE");
} else { beepError(); sendOpEvent(`Failed Transfer: Insufficient funds (${amt} ₽)`, "ERROR"); showMsg("Недостаточно средств", "INSUFFICIENT FUNDS", true); }
}

function logout(){
beepNav(); attempts=0; locked=false; inputData="";
sendOpEvent("User Logged Out / Card Returned", "INFO");
screenMode="welcome"; render();
card = "**** " + Math.floor(Math.random()*9000+1000);
balance = Math.floor(Math.random()*900000)+50000;
}

document.addEventListener('keydown', (e) => {
if(e.key >= '0' && e.key <= '9') keyPress(e.key); else if(e.key === 'Enter') keyEnter(); else if(e.key === 'Backspace' || e.key === 'Delete') keyClear(); else if(e.key === 'Escape') keyCancel();
});

render();
</script>
</body>
</html>
